<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="900" viewBox="0 0 1450 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
    </marker>
    <style>
      .box {
        fill: #ffffff;
        stroke: #111827;
        stroke-width: 1.5;
      }
      .user {
        fill: none;
        stroke: #1f2937;
        stroke-width: 4;
      }
      .line {
        fill: none;
        stroke: #111827;
        stroke-width: 1.5;
        marker-end: url(#arrow);
      }
      .plain-line {
        fill: none;
        stroke: #111827;
        stroke-width: 1.5;
      }
      .label {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 700;
      }
      .small {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
      }
      .italic {
        fill: #374151;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        font-style: italic;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1450" height="900" fill="#ffffff" />

  <rect x="255" y="20" width="150" height="70" class="box" />
  <text x="330" y="60" text-anchor="middle" class="small">Create User</text>

  <rect x="20" y="155" width="150" height="70" class="box" />
  <text x="95" y="195" text-anchor="middle" class="small">Login User</text>

  <circle cx="330" cy="190" r="23" class="user" />
  <path d="M290 260 C292 218, 368 218, 370 260 Z" class="user" />
  <text x="330" y="298" text-anchor="middle" class="small">User</text>

  <line x1="330" y1="90" x2="330" y2="160" class="line" />
  <text x="345" y="128" class="label">POST /user/signup</text>

  <line x1="170" y1="190" x2="285" y2="190" class="line" />
  <text x="198" y="176" class="label">POST /user/login</text>

  <rect x="760" y="150" width="190" height="70" class="box" />
  <text x="855" y="190" text-anchor="middle" class="small">Access Dashboard</text>

  <line x1="385" y1="190" x2="760" y2="190" class="line" />
  <text x="540" y="176" class="label">JWT Token</text>

  <line x1="330" y1="315" x2="330" y2="685" class="plain-line" />

  <rect x="555" y="340" width="160" height="70" class="box" />
  <text x="635" y="380" text-anchor="middle" class="small">Dashboard</text>

  <line x1="330" y1="375" x2="555" y2="375" class="line" />

  <path d="M715 375 L815 375 L815 275 L1180 275" class="line" />
  <text x="845" y="255" class="label">GET /asset</text>
  <text x="845" y="292" class="italic">No Role</text>
  <rect x="1180" y="240" width="210" height="70" class="box" />
  <text x="1285" y="280" text-anchor="middle" class="small">View Asset List</text>

  <path d="M715 375 L815 375 L815 425 L1180 425" class="line" />
  <text x="845" y="405" class="label">GET /asset/status/count</text>
  <text x="845" y="442" class="italic">No Role</text>
  <rect x="1180" y="390" width="210" height="70" class="box" />
  <text x="1285" y="430" text-anchor="middle" class="small">Dashboard Counts</text>

  <path d="M715 375 L815 375 L815 575 L1180 575" class="line" />
  <text x="845" y="555" class="label">PUT /asset/status/:assetID</text>
  <text x="845" y="592" class="label">Authenticated User</text>
  <rect x="1180" y="540" width="210" height="70" class="box" />
  <text x="1285" y="580" text-anchor="middle" class="small">Update Status</text>

  <rect x="555" y="685" width="190" height="80" class="box" />
  <text x="650" y="730" text-anchor="middle" class="small">Asset Management</text>

  <line x1="330" y1="725" x2="555" y2="725" class="line" />
  <text x="375" y="700" class="label">Role = "Admin"</text>

  <path d="M745 725 L835 725 L835 675 L1180 675" class="line" />
  <text x="865" y="655" class="label">POST /asset</text>
  <rect x="1180" y="640" width="210" height="70" class="box" />
  <text x="1285" y="680" text-anchor="middle" class="small">Create Asset</text>

  <path d="M745 725 L835 725 L835 780 L1180 780" class="line" />
  <text x="865" y="760" class="label">PUT /asset/:assetID</text>
  <rect x="1180" y="745" width="210" height="70" class="box" />
  <text x="1285" y="785" text-anchor="middle" class="small">Update Asset</text>

  <path d="M745 725 L835 725 L835 865 L1180 865" class="line" />
  <text x="865" y="845" class="label">DELETE /asset/:assetID</text>
  <rect x="1180" y="830" width="210" height="60" class="box" />
  <text x="1285" y="865" text-anchor="middle" class="small">Delete Asset</text>
</svg>
